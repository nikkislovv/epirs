<svg width="490" height="610" viewBox="0 0 490 610" xmlns="http://www.w3.org/2000/svg">
  <rect width="490" height="610" fill="#f5f4f2" rx="4"/>
  <defs>
    <pattern id="hatch" x="0" y="0" width="10" height="10"
             patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c0bdb8" stroke-width="1.4"/>
    </pattern>
    <pattern id="fiber_pat" x="0" y="0" width="14" height="5"
             patternUnits="userSpaceOnUse">
      <line x1="0" y1="2.5" x2="14" y2="2.5" stroke="#a08060" stroke-width="0.7"
            stroke-dasharray="5,3"/>
    </pattern>
    <marker id="arr_dn" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <polygon points="0,0 8,0 4,8" fill="#b8860b"/>
    </marker>
    <marker id="arr_rt" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 0,8 8,4" fill="#3d8f68"/>
    </marker>
    <marker id="arr_lt" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <polygon points="8,0 8,8 0,4" fill="#b8860b"/>
    </marker>
    <marker id="arr_up" markerWidth="8" markerHeight="8" refX="4" refY="1" orient="auto">
      <polygon points="0,8 8,8 4,0" fill="#b8860b"/>
