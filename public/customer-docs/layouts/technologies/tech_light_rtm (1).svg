  <text x="245" y="570" font-family="Montserrat,Arial,sans-serif" font-size="10.5" fill="#706a62" text-anchor="middle">Смола нагнетается под давлением в закрытую полость —</text>
  <text x="245" y="587" font-family="Montserrat,Arial,sans-serif" font-size="10.5" fill="#706a62" text-anchor="middle">точная геометрия, обе поверхности гладкие.</text>

